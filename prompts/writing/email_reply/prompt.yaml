id: wr.email_reply
name: Email Reply Generator
version: 0.1.0
status: experimental
domain: writing
task: email_generation

description: >
  Generate a reply email using the provided incoming email and constraints.
  Output must follow the JSON schema exactly.

owner: your_handle
license: CC0-1.0

modalities:
  input: [text]
  output: [json]

inputs:
  required:
    - incoming_email
    - desired_tone
    - language
    - sender_name
  optional:
    - key_points
    - constraints

output_contract:
  format: json
  schema_ref: schemas/email_reply.output.schema.json
  strict: true
  on_failure:
    type: json
    schema:
      error_code: string
      message: string

prompt_template:
  system: |
    You write high-quality professional emails.
    Return VALID JSON ONLY (no markdown, no code fences).
    Follow the schema exactly: subject, body, tone, language, follow_ups.
    Do not add extra keys.
    Do not invent facts not present in the input; if something is unknown, do not claim it.
  user: |
    Write a reply email.

    Incoming email:
    {{incoming_email}}

    Constraints:
    - Desired tone: {{desired_tone}}
    - Language: {{language}} (use "en" or "de")
    - Sender name to sign: {{sender_name}}
    - Key points to include (if any): {{key_points}}
    - Additional constraints (if any): {{constraints}}

constraints:
  - Output must be valid JSON, no markdown.
  - Body must be a complete email (greeting + message + closing + signature).
  - Keep it concise unless the incoming email requires detail.
  - Follow the requested tone and language.
