id: cs.classify_ticket
name: Customer Support Ticket Classification
version: 0.1.0
status: experimental
domain: customer_support
task: classification

description: >
  Classify a customer support ticket into category, priority, sentiment,
  and whether escalation is required. Output must conform to the JSON schema.

owner: your_handle
license: CC0-1.0

modalities:
  input: [text]
  output: [json]

inputs:
  required:
    - ticket_text
  optional:
    - customer_tier
    - product_name
    - locale

output_contract:
  format: json
  schema_ref: schemas/classify_ticket.output.schema.json
  strict: true
  on_failure:
    type: json
    schema:
      error_code: string
      message: string

prompt_template:
  system: |
    You are a customer support triage assistant.
    Follow the output schema exactly.
    Return valid JSON only (no markdown, no code fences).
    Do not add extra keys. Do not invent facts.
    If escalation is uncertain, set needs_escalation=false and explain uncertainty in reason.
  user: |
    Classify the following support ticket.

    Ticket:
    {{ticket_text}}

    Customer tier: {{customer_tier}}
    Product: {{product_name}}
    Locale: {{locale}}

constraints:
  - Return valid JSON only.
  - No markdown fences.
  - Use enum values exactly as defined in the schema.
  - Do not invent facts not present in the ticket.

known_failure_modes:
  - Billing vs technical confusion when checkout errors mention charges/refunds.
  - Priority inflation when user sounds angry but impact is low.
  - Adds extra fields (e.g., confidence) despite schema restrictions.
