version: 0.1.0
task: cs.classify_ticket

automated_checks:
  - name: valid_json
    weight: 1
    type: pass_fail
  - name: schema_valid
    weight: 2
    type: pass_fail
  - name: no_extra_keys
    weight: 1
    type: pass_fail

manual_checks:
  - name: category_correctness
    weight: 3
    scale: [0, 1, 2]
    guidance:
      0: incorrect
      1: partially correct / ambiguous
      2: correct
  - name: priority_correctness
    weight: 2
    scale: [0, 1, 2]
  - name: escalation_correctness
    weight: 2
    scale: [0, 1, 2]
  - name: hallucination_free
    weight: 2
    scale: [0, 1, 2]

scoring:
  normalized_to: 100
